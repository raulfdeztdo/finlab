services:
  finlab:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - TZ=Europe/Madrid
    restart: unless-stopped
    volumes:
      - finlab-cache:/app/data/cache
      - finlab-csv:/app/data/csv
      - finlab-db:/app/data/db

volumes:
  finlab-cache:
  finlab-csv:
  finlab-db:
